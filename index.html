<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>事業ロードマップ</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;color:#2C2C2A;background:#FBFAF7;display:flex;flex-direction:column;overflow:hidden}
.bm-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 14px;font-size:13px;border-bottom:1px solid #E4E2DA;background:#fff}
.bm-title{font-weight:700}
.bm-title span{font-weight:400;color:#888780;font-size:12px}
.bm-prog{flex:1;min-width:120px;height:8px;background:#E4E2DA;border-radius:5px;overflow:hidden}
.bm-fill{height:100%;width:0;background:#639922;transition:width .35s}
#ov-txt{font-size:12px;color:#5F5E5A;min-width:84px;text-align:right}
.bm-zoom button{width:32px;height:30px;border:1px solid #D3D1C7;background:#fff;border-radius:7px;font-size:15px;cursor:pointer;color:#444441}
.bm-zoom button:active{background:#F1EFE8}
#wrap{flex:1;min-height:0}
#bm-svg{width:100%;height:100%;touch-action:none;display:block}
.node.current .ring{opacity:1;animation:bmp 1.7s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes bmp{0%,100%{transform:scale(1);opacity:.75}50%{transform:scale(1.14);opacity:.12}}
.hint{position:fixed;bottom:8px;left:14px;font-size:11px;color:#AEACA2}
</style>
</head>
<body>
<div class="bm-bar">
<div class="bm-title">事業ロードマップ <span>タスクをクリック＝完了 → 矢印の先が解放</span></div>
<div class="bm-prog"><div class="bm-fill" id="ov-fill"></div></div>
<div id="ov-txt"></div>
<div class="bm-zoom"><button data-z="in" title="拡大">＋</button><button data-z="out" title="縮小">－</button><button data-z="fit" title="全体表示">⤢</button><button data-z="reset" title="進捗リセット" style="width:auto;padding:0 8px;font-size:12px">↺</button></div>
</div>
<div id="wrap"><svg id="bm-svg" viewBox="0 0 900 560"><defs id="bm-defs"></defs><g id="world"></g></svg></div>
<div class="hint">ドラッグで移動 ／ ホイール・ピンチで拡大縮小 ／ 進捗はこの端末に保存されます</div>
<script>
(function(){
var data=[
{key:'fund',label:'資金調達',color:'#534AB7',dir:[-1,-0.62],goal:'シード資金確保',tasks:[['事業計画書','6/20'],['VC 5社へ打診','6/30'],['調達ラウンド','7/15']]},
{key:'hotel',label:'ホテル連携',color:'#0F6E56',dir:[1,-0.62],goal:'提携1件 成立',tasks:[['候補3社リスト','6/22'],['条件ドラフト','7/05'],['MOU 締結','7/30']]},
{key:'team',label:'採用・組織',color:'#993556',dir:[-1,0.62],goal:'チーム5名体制',tasks:[['コアメンバー定義','6/18'],['採用ページ公開','7/01'],['業務委託2名','7/12']]},
{key:'resi',label:'レジデンス構想',color:'#993C1D',dir:[1,0.62],goal:'構想書 完成',tasks:[['コンセプト設計','6/25'],['物件サーベイ','7/10'],['収支試算','7/20']]}
];
var CX=600,CY=400,R=30,GR=34;
var state={};try{state=JSON.parse(localStorage.getItem('bm-state')||'')||{}}catch(e){state={}}
if(!Object.keys(state).length)state={fund:1,hotel:1,team:1,resi:0};
function save(){try{localStorage.setItem('bm-state',JSON.stringify(state))}catch(e){}}
var world=document.getElementById('world'),defs=document.getElementById('bm-defs');
var conns='',nodes='',mk='';
data.forEach(function(b){
var L=Math.hypot(b.dir[0],b.dir[1]),ux=b.dir[0]/L,uy=b.dir[1]/L,n=b.tasks.length;
var pts=[];for(var i=0;i<=n;i++){var d=150+i*120;pts.push([CX+ux*d,CY+uy*d])}
var prev=[CX,CY],prevR=46;
for(var i=0;i<=n;i++){var p=pts[i],tR=(i===n?GR:R);var sx=prev[0],sy=prev[1],ex=p[0],ey=p[1];var dx=ex-sx,dy=ey-sy,dl=Math.hypot(dx,dy),vx=dx/dl,vy=dy/dl;var x1=sx+vx*prevR,y1=sy+vy*prevR,x2=ex-vx*(tR+6),y2=ey-vy*(tR+6);conns+='<line id="c-'+b.key+'-'+i+'" x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="#D3D1C7" stroke-width="2.5"/>';prev=p;prevR=tR}
for(var i=0;i<=n;i++){var p=pts[i],isG=i===n,r=isG?GR:R,lbl=isG?b.goal:b.tasks[i][0],dt=isG?'★ GOAL':b.tasks[i][1];
nodes+='<g class="node" data-b="'+b.key+'" data-i="'+i+'" transform="translate('+p[0].toFixed(1)+' '+p[1].toFixed(1)+')" style="cursor:pointer">'
+'<circle class="ring" r="'+(r+7)+'" fill="none" stroke="'+b.color+'" stroke-width="2.5" opacity="0"/>'
+'<circle class="disc" r="'+r+'" fill="#ECEAE3" stroke="#CFCDC4" stroke-width="3"/>'
+'<text class="num" y="6" text-anchor="middle" font-size="'+(isG?19:17)+'" font-weight="700" fill="#AEACA2">'+(isG?'★':(i+1))+'</text>'
+'<text class="lbl" y="'+(r+18)+'" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2C2C2A">'+lbl+'</text>'
+'<text class="dt" y="'+(r+33)+'" text-anchor="middle" font-size="11" fill="#888780">'+dt+'</text></g>'}
mk+='<marker id="ar-'+b.key+'" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="'+b.color+'"/></marker>'
});
defs.innerHTML=mk;
var center='<g><circle r="46" cx="'+CX+'" cy="'+CY+'" fill="#2C2C2A"/><text x="'+CX+'" y="'+(CY-2)+'" text-anchor="middle" fill="#fff" font-size="19" font-weight="700">事業</text><text x="'+CX+'" y="'+(CY+16)+'" text-anchor="middle" fill="#D3D1C7" font-size="11">Core</text></g>';
world.innerHTML=conns+center+nodes;
function render(){var done=0,total=0;
data.forEach(function(b){var dc=state[b.key]||0,n=b.tasks.length;total+=n;done+=Math.min(dc,n);
for(var i=0;i<=n;i++){var sel=document.querySelector('.node[data-b="'+b.key+'"][data-i="'+i+'"]');var disc=sel.querySelector('.disc'),num=sel.querySelector('.num'),lb=sel.querySelector('.lbl');sel.classList.remove('current');
if(i<n){if(i<dc){disc.setAttribute('fill',b.color);disc.setAttribute('stroke',b.color);num.textContent='✓';num.setAttribute('fill','#fff');sel.setAttribute('opacity','1');lb.setAttribute('text-decoration','line-through');lb.setAttribute('fill','#9A988F')}
else if(i===dc){disc.setAttribute('fill','#fff');disc.setAttribute('stroke',b.color);num.textContent=(i+1);num.setAttribute('fill',b.color);sel.setAttribute('opacity','1');lb.setAttribute('text-decoration','none');lb.setAttribute('fill','#2C2C2A');sel.classList.add('current')}
else{disc.setAttribute('fill','#ECEAE3');disc.setAttribute('stroke','#CFCDC4');num.textContent=(i+1);num.setAttribute('fill','#AEACA2');sel.setAttribute('opacity','0.5');lb.setAttribute('text-decoration','none');lb.setAttribute('fill','#AEACA2')}}
else{if(dc===n){disc.setAttribute('fill','#BA7517');disc.setAttribute('stroke','#854F0B');num.setAttribute('fill','#fff');sel.setAttribute('opacity','1');lb.setAttribute('fill','#854F0B')}else{disc.setAttribute('fill','#F4EFE3');disc.setAttribute('stroke','#E0C893');num.setAttribute('fill','#D9C18E');sel.setAttribute('opacity','0.55');lb.setAttribute('fill','#AEACA2')}}}
for(var i=0;i<=n;i++){var c=document.getElementById('c-'+b.key+'-'+i);if(i<=dc){c.setAttribute('stroke',b.color);c.setAttribute('stroke-width','4');c.removeAttribute('stroke-dasharray');c.setAttribute('opacity','1');c.setAttribute('marker-end','url(#ar-'+b.key+')')}else{c.setAttribute('stroke','#D3D1C7');c.setAttribute('stroke-width','2.5');c.setAttribute('stroke-dasharray','5 6');c.setAttribute('opacity','0.85');c.removeAttribute('marker-end')}}});
document.getElementById('ov-fill').style.width=(total?done/total*100:0)+'%';document.getElementById('ov-txt').textContent=done+' / '+total+' 完了'}
var tx=0,ty=0,k=1;function apply(){world.setAttribute('transform','translate('+tx+' '+ty+') scale('+k+')')}
function fit(){var bb=world.getBBox(),pad=40;k=Math.min((900-pad*2)/bb.width,(560-pad*2)/bb.height);tx=pad-bb.x*k+((900-pad*2)-bb.width*k)/2;ty=pad-bb.y*k+((560-pad*2)-bb.height*k)/2;apply()}
var svg=document.getElementById('bm-svg');
function toVB(cx,cy){var r=svg.getBoundingClientRect();return[(cx-r.left)/r.width*900,(cy-r.top)/r.height*560]}
var dragging=false,moved=false,sx0,sy0,tx0,ty0,pinch=null;
svg.addEventListener('pointerdown',function(e){dragging=true;moved=false;sx0=e.clientX;sy0=e.clientY;tx0=tx;ty0=ty;svg.setPointerCapture(e.pointerId)});
svg.addEventListener('pointermove',function(e){if(!dragging)return;var dx=e.clientX-sx0,dy=e.clientY-sy0;if(Math.abs(dx)+Math.abs(dy)>4)moved=true;var r=svg.getBoundingClientRect();tx=tx0+dx/r.width*900;ty=ty0+dy/r.height*560;apply()});
svg.addEventListener('pointerup',function(e){dragging=false;if(!moved){var g=e.target.closest('.node');if(g){var key=g.getAttribute('data-b'),i=+g.getAttribute('data-i'),b=data.filter(function(x){return x.key===key})[0],n=b.tasks.length,dc=state[key]||0;if(i<n){if(i===dc)state[key]=dc+1;else if(i===dc-1)state[key]=dc-1;save();render()}}}});
svg.addEventListener('wheel',function(e){e.preventDefault();var p=toVB(e.clientX,e.clientY),wx=(p[0]-tx)/k,wy=(p[1]-ty)/k,nk=Math.min(2.8,Math.max(0.3,k*(e.deltaY<0?1.12:0.89)));tx=p[0]-wx*nk;ty=p[1]-wy*nk;k=nk;apply()},{passive:false});
document.querySelector('.bm-zoom').addEventListener('click',function(e){var z=e.target.getAttribute('data-z');if(!z)return;if(z==='fit'){fit();return}if(z==='reset'){if(confirm('進捗をリセットしますか？')){state={fund:0,hotel:0,team:0,resi:0};save();render()}return}var nk=Math.min(2.8,Math.max(0.3,k*(z==='in'?1.2:0.83)));var cx=450,cy=280,wx=(cx-tx)/k,wy=(cy-ty)/k;tx=cx-wx*nk;ty=cy-wy*nk;k=nk;apply()});
window.addEventListener('resize',function(){});
fit();render();
})();
</script>
</body>
</html>
