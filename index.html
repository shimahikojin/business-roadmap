<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>事業ロードマップ</title>
<style>
:root{--bg:#F5F5F7;--txt:#1D1D1F;--sec:#6E6E73;--ter:#AEAEB2;--sep:rgba(0,0,0,.08);--accent:#0071e3;--red:#FF3B30}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Hiragino Sans","Noto Sans JP",sans-serif;color:var(--txt);background:var(--bg);display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
.bar{height:52px;display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--sep);z-index:10;position:relative}
.app{font-size:15px;font-weight:600;letter-spacing:-.01em}
.spacer{flex:1}
.prg{display:flex;align-items:center;gap:7px;margin-right:4px}
.prg .ring{transform:rotate(-90deg)}
.prg span{font-size:13px;color:var(--sec);font-variant-numeric:tabular-nums}
.tb{height:32px;padding:0 13px;border-radius:9px;border:none;background:rgba(0,0,0,.05);color:var(--txt);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .15s}
.tb:hover{background:rgba(0,0,0,.09)}
.tb:active{background:rgba(0,0,0,.13)}
.tb.pri{background:var(--accent);color:#fff}
.tb.pri:hover{background:#0077ed}
.tb.icon{width:34px;padding:0;justify-content:center;font-size:17px}
main{flex:1;position:relative;min-height:0;overflow:hidden}
#viewport{position:absolute;inset:0;overflow:hidden;cursor:grab;touch-action:none;user-select:none;background-image:radial-gradient(rgba(0,0,0,.055) 1.2px,transparent 1.2px);background-size:24px 24px}
#viewport.grabbing{cursor:grabbing}
#edges{position:absolute;inset:0;z-index:0}
#world{position:absolute;top:0;left:0;transform-origin:0 0;z-index:1}
.node{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;gap:10px;background:#fff;border-radius:15px;padding:11px 15px;font-size:14.5px;font-weight:500;color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.13),0 10px 26px rgba(0,0,0,.11);cursor:grab;width:max-content;max-width:212px;transition:box-shadow .18s,opacity .2s,transform .2s}
.node:hover{box-shadow:0 2px 6px rgba(0,0,0,.16),0 16px 34px rgba(0,0,0,.14)}
.node.sel{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--c,var(--accent)),0 12px 28px rgba(0,0,0,.16)}
.node.dim{opacity:.26;filter:saturate(.6)}
.node.next::before{content:"";position:absolute;inset:-4px;border-radius:18px;border:2.5px solid var(--c);animation:nx 1.5s ease-in-out infinite;pointer-events:none}
@keyframes nx{0%,100%{opacity:.95;transform:scale(1)}50%{opacity:.25;transform:scale(1.07)}}
.node.next{box-shadow:0 0 0 2px #fff,0 6px 18px rgba(0,0,0,.14),0 0 14px var(--c)}
.ttl{outline:none;line-height:1.34;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.node.editing .ttl{-webkit-line-clamp:unset;overflow:visible;box-shadow:0 0 0 2px var(--accent);border-radius:5px;padding:0 3px;margin:0 -3px}
.node.root{background:#1D1D1F;color:#fff;font-weight:600;font-size:16.5px;padding:14px 24px;border-radius:26px;box-shadow:0 2px 6px rgba(0,0,0,.2),0 14px 32px rgba(0,0,0,.22)}
.node.branch{font-size:15.5px}
.node.branch .ttl{color:var(--c);font-weight:700}
.bdot{width:11px;height:11px;border-radius:50%;background:var(--c);flex:none}
.frac{font-size:13px;color:var(--sec);font-weight:600;font-variant-numeric:tabular-nums}
.check{width:24px;height:24px;border-radius:50%;border:2.5px solid #C7C7CC;position:relative;flex:none;cursor:pointer;transition:background .15s,border-color .15s}
.check::before{content:"";position:absolute;inset:-11px;border-radius:50%}
.check:hover{border-color:var(--c)}
.check:active{transform:scale(.9)}
.check.on{background:var(--c);border-color:var(--c)}
.check.on::after{content:"";position:absolute;left:7.5px;top:3px;width:4.5px;height:10px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
.node.leaf.done{opacity:.5}
.node.leaf.done .ttl{text-decoration:line-through;color:var(--ter)}
.node.leaf.wait .check{border-color:#E0A52E;border-style:dashed;background:#FFF8EC}
.waitpill{font-size:11.5px;color:#9A6300;background:#FFF1D6;border-radius:7px;padding:2.5px 8px;font-weight:600;flex:none}
.due{font-size:12px;color:var(--sec);background:#F2F2F7;border-radius:8px;padding:2.5px 8px;font-weight:600;font-variant-numeric:tabular-nums;flex:none}
.due.over{color:var(--red);background:rgba(255,59,48,.12)}
.due.soon{color:#9A6300;background:#FFF1D6}
.tb.on{background:var(--accent);color:#fff}
.tb.on:hover{background:#0077ed}
.legend{position:absolute;left:14px;bottom:14px;z-index:5;display:flex;gap:7px;flex-wrap:wrap;pointer-events:none}
.lg{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--sec);background:rgba(255,255,255,.82);backdrop-filter:blur(8px);border:1px solid var(--sep);border-radius:20px;padding:3px 9px;font-weight:500}
.lg i{width:9px;height:9px;border-radius:50%;display:inline-block}
.lg.next i{background:#0071e3;box-shadow:0 0 0 2px rgba(0,113,227,.25)}
.lg.wait i{background:#FFF8EC;border:1.5px dashed #E0A52E}
.lg.over i{background:var(--red)}
.ndot{width:6px;height:6px;border-radius:50%;background:#FF9F0A;flex:none}
.collapse{width:21px;height:21px;border-radius:50%;background:#fff;border:1px solid var(--sep);color:var(--sec);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.1);flex:none}
.collapse:hover{color:var(--txt)}
.zoom{position:absolute;right:16px;bottom:16px;display:flex;flex-direction:column;background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border:1px solid var(--sep);border-radius:13px;box-shadow:0 4px 18px rgba(0,0,0,.14);overflow:hidden;z-index:6}
.zoom button{width:42px;height:42px;border:none;background:transparent;font-size:19px;color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center}
.zoom button:hover{background:rgba(0,0,0,.06)}
.zoom button:active{background:rgba(0,0,0,.1)}
.zoom .sep{height:1px;background:var(--sep)}
.hint{position:absolute;left:16px;bottom:46px;font-size:11.5px;color:var(--ter);z-index:5;pointer-events:none;max-width:62%;line-height:1.5}
.menu{position:absolute;top:50px;right:14px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border:1px solid var(--sep);border-radius:13px;box-shadow:0 10px 36px rgba(0,0,0,.2);padding:6px;min-width:196px;z-index:30;display:none}
.menu.open{display:block}
.menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:none;background:transparent;padding:9px 11px;border-radius:9px;font-size:13.5px;color:var(--txt);cursor:pointer}
.menu button:hover{background:rgba(0,0,0,.06)}
.menu .danger{color:var(--red)}
.menu .div{height:1px;background:var(--sep);margin:5px 8px}
.inspector{position:absolute;top:0;right:0;height:100%;width:330px;max-width:86vw;background:var(--bg);border-left:1px solid var(--sep);transform:translateX(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);z-index:8;display:flex;flex-direction:column;box-shadow:-6px 0 30px rgba(0,0,0,.08)}
.inspector.open{transform:none}
.ihead{display:flex;align-items:center;gap:8px;padding:14px 16px 12px}
.ihead input{flex:1;border:none;background:transparent;font-size:18px;font-weight:600;color:var(--txt);outline:none;letter-spacing:-.01em}
.xbtn{width:30px;height:30px;border:none;border-radius:50%;background:rgba(0,0,0,.06);color:var(--sec);font-size:16px;cursor:pointer;flex:none}
.xbtn:hover{background:rgba(0,0,0,.1)}
.ibody{flex:1;overflow:auto;padding:6px 16px 24px}
.sect{font-size:12px;color:var(--sec);font-weight:600;letter-spacing:.02em;margin:18px 4px 7px}
.card{background:#fff;border-radius:13px;overflow:hidden}
.row{display:flex;align-items:center;gap:10px;padding:12px 14px;min-height:50px}
.row+.row{border-top:1px solid var(--sep)}
.row label{flex:1;font-size:14.5px}
.idate,.inotes{width:100%;border:none;background:transparent;font:inherit;font-size:14.5px;color:var(--txt);outline:none}
.inotes{padding:12px 14px;resize:vertical;min-height:92px;line-height:1.5}
.switch{position:relative;width:51px;height:31px;flex:none}
.switch input{opacity:0;width:100%;height:100%;margin:0;cursor:pointer;position:relative;z-index:2}
.switch .track{position:absolute;inset:0;background:#E9E9EA;border-radius:16px;transition:background .25s}
.switch .knob{position:absolute;top:2px;left:2px;width:27px;height:27px;background:#fff;border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,.25);transition:transform .25s}
.switch input:checked~.track{background:#34C759}
.switch input:checked~.track.amber{background:#FF9F0A}
.switch input:checked~.knob{transform:translateX(20px)}
.swatches{display:flex;gap:0;flex-wrap:wrap;padding:12px 10px}
.sw{width:30px;height:30px;border-radius:50%;cursor:pointer;margin:4px;position:relative}
.sw.on::after{content:"";position:absolute;inset:-4px;border:2px solid var(--txt);border-radius:50%}
.ibtn{width:100%;height:44px;border:none;border-radius:12px;font-size:14.5px;font-weight:500;cursor:pointer;margin-top:9px}
.ibtn.pri{background:var(--accent);color:#fff}
.ibtn.pri:hover{background:#0077ed}
.ibtn.sec{background:rgba(0,0,0,.05);color:var(--txt)}
.ibtn.sec:hover{background:rgba(0,0,0,.09)}
.ibtn.danger{background:rgba(255,59,48,.1);color:var(--red)}
.ibtn.danger:hover{background:rgba(255,59,48,.16)}
</style>
</head>
<body>
<div class="bar">
<span class="app">事業ロードマップ</span>
<span class="spacer"></span>
<span class="prg"><svg class="ring" width="22" height="22"><circle cx="11" cy="11" r="8.5" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="3"></circle><circle id="ringfg" cx="11" cy="11" r="8.5" fill="none" stroke="#34C759" stroke-width="3" stroke-linecap="round" stroke-dasharray="53.4" stroke-dashoffset="53.4"></circle></svg><span id="fractxt">0/0</span></span>
<button class="tb" data-act="focus" id="focusBtn" title="次にやる＋期限超過だけを強調">🎯&nbsp;今やること</button>
<button class="tb pri" data-act="add-child">＋&nbsp;追加</button>
<button class="tb icon" data-act="menu" title="その他">⋯</button>
</div>
<div class="menu" id="menu">
<button data-act="layout">自動で整列</button>
<button data-act="add-sib">兄弟タスクを追加</button>
<div class="div"></div>
<button data-act="export">JSONで書き出し</button>
<button data-act="import">JSONを読み込み</button>
<div class="div"></div>
<button data-act="reset" class="danger">進捗をリセット</button>
<input type="file" id="file" accept="application/json" style="display:none">
</div>
<main>
<div id="viewport"><canvas id="edges"></canvas><div id="world"></div>
<div class="hint">ドラッグで移動 ／ ホイールで拡大 ／ ○をタップで完了 ／ ダブルクリックで改名</div>
<div class="legend"><span class="lg next"><i></i>次にやる</span><span class="lg wait"><i></i>待ち（相手）</span><span class="lg over"><i></i>期限超過</span></div>
<div class="zoom"><button data-act="zin">＋</button><div class="sep"></div><button data-act="zout">−</button><div class="sep"></div><button data-act="fit" title="全体表示"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6V2h4M14 6V2h-4M2 10v4h4M14 10v4h-4"/></svg></button></div>
<div class="inspector" id="inspector">
<div class="ihead"><input type="text" id="iTitle" placeholder="無題"><button class="xbtn" data-act="close">✕</button></div>
<div class="ibody">
<div id="iStatusSect"><div class="sect">状態</div><div class="card" id="iStatusCard"></div></div>
<div class="sect">期限</div><div class="card"><div class="row"><input type="date" class="idate" id="iDue"></div></div>
<div class="sect">テーマカラー</div><div class="card"><div class="swatches" id="iColors"></div></div>
<div class="sect">メモ・詳細</div><div class="card"><textarea class="inotes" id="iNotes" placeholder="背景・担当・リンクなど"></textarea></div>
<button class="ibtn pri" data-act="add-child">子タスクを追加</button>
<button class="ibtn sec" data-act="add-sib" id="iSib">兄弟タスクを追加</button>
<button class="ibtn danger" data-act="del" id="iDel">このタスクを削除</button>
</div>
</div>
</main>
<script>
(function(){
var TODAY="2026-06-17";
var PAL=["#0071e3","#34C759","#FF375F","#FF9500","#AF52DE","#5AC8FA","#FF9F0A","#8E8E93"];
var KEY="bm-model-v4";
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function fmtDue(d){return d?(+d.slice(5,7))+"/"+(+d.slice(8,10)):""}
function isOver(n){return n.due&&!n.done&&!n.wait&&n.due<TODAY}
function relDue(n){if(!n.due)return null;var fmt=fmtDue(n.due);if(n.done)return{t:fmt,cls:""};var d=Math.round((new Date(n.due)-new Date(TODAY))/86400000);if(d<0)return{t:"超過"+(-d)+"日",cls:"over"};if(d===0)return{t:"今日",cls:"over"};if(d===1)return{t:"明日",cls:"soon"};if(d<=6)return{t:"あと"+d+"日",cls:"soon"};return{t:fmt,cls:""}}

function layout(m){
 function kids(id){var r=[];for(var key in m.nodes)if(m.nodes[key].parent===id)r.push(m.nodes[key]);return r}
 var R=m.nodes[m.rootId];R.x=3000;R.y=2000;
 var rc=kids(m.rootId),n=rc.length||1;
 rc.forEach(function(c,i){var a=-Math.PI/2+i*(2*Math.PI/n);c.x=R.x+Math.cos(a)*340;c.y=R.y+Math.sin(a)*340*0.88;sub(c,a,380)});
 function sub(node,dir,dist){var ch=kids(node.id),mm=ch.length;if(!mm)return;var gap=0.66,span=(mm-1)*gap;ch.forEach(function(c,i){var a=dir+(i*gap-span/2);c.x=node.x+Math.cos(a)*dist;c.y=node.y+Math.sin(a)*dist*0.88;sub(c,a,dist*0.82)})}
}
function defaultModel(){
 var nodes={},seq=0;
 nodes.root={id:"root",parent:null,title:"事業"};
 var brs=[
  ["💰 資金調達","#0071e3",[["事業計画書を作成","2026-06-12",true,false],["投資家へ打診","2026-07-10",false,false],["先方の検討","",false,true]]],
  ["🤝 営業・提携","#34C759",[["候補リスト作成","2026-06-15",false,false],["条件すり合わせ","2026-07-04",false,false],["先方の社内承認","",false,true]]],
  ["👥 採用・組織","#FF9500",[["募集要項を作成","2026-06-22",false,false],["面談を設定","2026-07-05",false,false],["内定承諾","",false,true]]],
  ["🚀 プロダクト","#AF52DE",[["要件定義","2026-06-20",false,false],["試作をつくる","2026-07-15",false,false],["ユーザーテスト","2026-07-28",false,false]]]
 ];
 brs.forEach(function(b){seq++;var bid="n"+seq;nodes[bid]={id:bid,parent:"root",title:b[0],color:b[1]};b[2].forEach(function(t){seq++;var tid="n"+seq;nodes[tid]={id:tid,parent:bid,title:t[0],due:t[1],done:t[2],wait:t[3]}})});
 var m={nodes:nodes,rootId:"root",seq:seq};layout(m);return m;
}
var model;try{model=JSON.parse(localStorage.getItem(KEY)||"")}catch(e){}
if(!model||!model.nodes||!model.nodes[model.rootId])model=defaultModel();
function save(){try{localStorage.setItem(KEY,JSON.stringify(model))}catch(e){}}
function genId(){model.seq=(model.seq||0)+1;return "n"+model.seq}
function childrenOf(id){var r=[];for(var k in model.nodes)if(model.nodes[k].parent===id)r.push(model.nodes[k]);return r}
function colorOf(id){var n=model.nodes[id];if(!n)return "#8E8E93";if(n.color)return n.color;if(n.parent&&n.parent!==model.rootId)return colorOf(n.parent);if(n.parent===model.rootId)return "#8E8E93";return "#1D1D1F"}
function isDesc(a,b){var n=model.nodes[a];while(n&&n.parent){if(n.parent===b)return true;n=model.nodes[n.parent]}return false}
function leafStats(id){var done=0,total=0;(function rec(i){var ch=childrenOf(i);if(!ch.length){if(i!==model.rootId){total++;if(model.nodes[i].done)done++}}else ch.forEach(function(c){rec(c.id)})})(id);return{done:done,total:total}}
function visibleNodes(){var out=[];(function rec(id){var n=model.nodes[id];if(!n)return;out.push(n);if(n.collapsed)return;childrenOf(id).forEach(function(c){rec(c.id)})})(model.rootId);return out}

var viewport=document.getElementById("viewport"),world=document.getElementById("world"),cv=document.getElementById("edges"),ctx=cv.getContext("2d");
var inspector=document.getElementById("inspector"),menu=document.getElementById("menu");
var selected=null,editing=false,nodeEls={},nextSet={},focusMode=false;
function computeNext(){nextSet={};for(var pid in model.nodes){var ch=childrenOf(pid);if(!ch.length)continue;for(var i=0;i<ch.length;i++){var c=ch[i],cc=childrenOf(c.id),settled;if(cc.length){var st=leafStats(c.id);settled=(st.total>0&&st.done===st.total)}else{settled=c.done||c.wait}if(settled)continue;if(!cc.length&&!c.done&&!c.wait)nextSet[c.id]=1;break}}}
var tx=0,ty=0,k=1;
function applyT(){world.style.transform="translate("+tx+"px,"+ty+"px) scale("+k+")";drawEdges()}
function resizeCanvas(){var dpr=window.devicePixelRatio||1;cv.width=viewport.clientWidth*dpr;cv.height=viewport.clientHeight*dpr;cv.style.width=viewport.clientWidth+"px";cv.style.height=viewport.clientHeight+"px";drawEdges()}
function bz(a,b,c,d,t){var u=1-t;return u*u*u*a+3*u*u*t*b+3*u*t*t*c+t*t*t*d}
function drawEdges(){var dpr=window.devicePixelRatio||1;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,cv.clientWidth,cv.clientHeight);ctx.lineCap="round";ctx.lineJoin="round";
 visibleNodes().forEach(function(n){if(n.id===model.rootId)return;var p=model.nodes[n.parent];if(!p)return;var x1=p.x*k+tx,y1=p.y*k+ty,x2=n.x*k+tx,y2=n.y*k+ty,mx=(x1+x2)/2,col=colorOf(n.id);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.bezierCurveTo(mx,y1,mx,y2,x2,y2);ctx.strokeStyle=col;ctx.globalAlpha=.82;ctx.lineWidth=Math.max(2,3.4*k);ctx.stroke();
  var t0=.72,t1=.79,ax=bz(x1,mx,mx,x2,t0),ay=bz(y1,y1,y2,y2,t0),bx=bz(x1,mx,mx,x2,t1),by=bz(y1,y1,y2,y2,t1),ang=Math.atan2(by-ay,bx-ax),s=Math.max(6,8*k);
  ctx.globalAlpha=.92;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx-s*Math.cos(ang-.42),by-s*Math.sin(ang-.42));ctx.lineTo(bx-s*Math.cos(ang+.42),by-s*Math.sin(ang+.42));ctx.closePath();ctx.fillStyle=col;ctx.fill()});
 ctx.globalAlpha=1}

function makeNodeEl(n){var div=document.createElement("div");var ch=childrenOf(n.id),col=colorOf(n.id),sel=(n.id===selected?" sel":"");
 div.dataset.id=n.id;div.style.left=n.x+"px";div.style.top=n.y+"px";div.style.setProperty("--c",col);
 var collapse=ch.length?'<span class="collapse">'+(n.collapsed?ch.length:"–")+"</span>":"";
 var rd=relDue(n),due=rd?'<span class="due '+rd.cls+'">'+rd.t+"</span>":"";
 if(n.id===model.rootId){div.className="node root"+sel;div.innerHTML='<span class="ttl">'+esc(n.title)+"</span>"+collapse}
 else if(ch.length){var st=leafStats(n.id);div.className="node branch"+sel;div.innerHTML='<span class="bdot"></span><span class="ttl">'+esc(n.title)+'</span><span class="frac">'+st.done+"/"+st.total+"</span>"+due+collapse}
 else{var wait=n.wait&&!n.done;var dim=focusMode&&!(nextSet[n.id]||isOver(n))?" dim":"";div.className="node leaf"+(n.done?" done":(wait?" wait":""))+(nextSet[n.id]?" next":"")+dim+sel;div.innerHTML='<span class="check'+(n.done?" on":"")+'"></span><span class="ttl">'+esc(n.title)+"</span>"+(wait?'<span class="waitpill">待ち</span>':"")+due+(n.notes?'<span class="ndot" title="メモあり"></span>':"")}
 nodeEls[n.id]=div;return div}
function renderNodes(){Array.prototype.forEach.call(world.querySelectorAll(".node"),function(e){e.remove()});nodeEls={};visibleNodes().forEach(function(n){world.appendChild(makeNodeEl(n))})}
function render(){computeNext();renderNodes();drawEdges();updateInspector();updateProgress()}
function updateProgress(){var st=leafStats(model.rootId),f=st.total?st.done/st.total:0;document.getElementById("ringfg").setAttribute("stroke-dashoffset",53.4*(1-f));var od=0;for(var key in model.nodes){var nn=model.nodes[key];if(nn.id!==model.rootId&&!childrenOf(key).length&&nn.due&&nn.due<TODAY&&!nn.done&&!nn.wait)od++}document.getElementById("fractxt").innerHTML=st.done+"/"+st.total+(od?' <span style="color:#FF3B30;font-weight:600">⏰'+od+"</span>":"")}

function fit(){var vis=visibleNodes(),xs=vis.map(function(n){return n.x}),ys=vis.map(function(n){return n.y});var minX=Math.min.apply(0,xs),maxX=Math.max.apply(0,xs),minY=Math.min.apply(0,ys),maxY=Math.max.apply(0,ys);var w=(maxX-minX)+340,h=(maxY-minY)+260,vw=viewport.clientWidth,vh=viewport.clientHeight;k=Math.min(vw/w,vh/h);if(!isFinite(k)||k<=0)k=1;k=Math.max(.45,Math.min(1.15,k));tx=vw/2-(minX+maxX)/2*k;ty=vh/2-(minY+maxY)/2*k;applyT()}
function zoomAt(sx,sy,f){var wx=(sx-tx)/k,wy=(sy-ty)/k,nk=Math.max(.25,Math.min(2.8,k*f));tx=sx-wx*nk;ty=sy-wy*nk;k=nk;applyT()}
function ensureVisible(id){var n=model.nodes[id];if(!n)return;var pad=110,panel=inspector.classList.contains("open")?348:0;var sx=n.x*k+tx,sy=n.y*k+ty,L=pad,Rr=viewport.clientWidth-panel-pad,T=pad,B=viewport.clientHeight-pad,dx=0,dy=0;if(Rr<L)Rr=L;if(sx<L)dx=L-sx;else if(sx>Rr)dx=Rr-sx;if(sy<T)dy=T-sy;else if(sy>B)dy=B-sy;if(dx||dy){tx+=dx;ty+=dy;applyT()}}

function select(id){selected=id;render();ensureVisible(id)}
function startEdit(id){var el=nodeEls[id];if(!el)return;var t=el.querySelector(".ttl");t.contentEditable=true;editing=true;el.classList.add("editing");t.focus();var r=document.createRange();r.selectNodeContents(t);var s=window.getSelection();s.removeAllRanges();s.addRange(r);
 function fin(){t.contentEditable=false;editing=false;el.classList.remove("editing");model.nodes[id].title=t.textContent.trim()||"無題";t.removeEventListener("blur",fin);t.removeEventListener("keydown",kd);save();render()}
 function kd(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();t.blur()}else if(e.key==="Escape"){e.preventDefault();t.blur()}}
 t.addEventListener("blur",fin);t.addEventListener("keydown",kd)}
function addChild(pid){if(!pid)pid=model.rootId;var p=model.nodes[pid];if(!p)return;if(p.collapsed)p.collapsed=false;var sib=childrenOf(pid).length,id=genId();model.nodes[id]={id:id,parent:pid,title:"新しいタスク",due:"",done:false,x:(p.x||3000)+220,y:(p.y||2000)+(sib*66-33)};selected=id;save();render();ensureVisible(id);startEdit(id)}
function addSibling(id){if(!id||id===model.rootId)return;addChild(model.nodes[id].parent)}
function del(id){if(!id||id===model.rootId)return;var rm=[];(function rec(i){rm.push(i);childrenOf(i).forEach(function(c){rec(c.id)})})(id);var par=model.nodes[id].parent;rm.forEach(function(i){delete model.nodes[i]});selected=par;save();render();ensureVisible(par)}

var iTitle=document.getElementById("iTitle"),iDue=document.getElementById("iDue"),iNotes=document.getElementById("iNotes"),iColors=document.getElementById("iColors"),iStatusCard=document.getElementById("iStatusCard");
PAL.forEach(function(c){var s=document.createElement("span");s.className="sw";s.style.background=c;s.dataset.c=c;iColors.appendChild(s)});
function updateInspector(){var n=selected&&model.nodes[selected];if(!n){inspector.classList.remove("open");return}inspector.classList.add("open");
 iTitle.value=(n.title==="無題"?"":n.title);iDue.value=n.due||"";iDue.disabled=(n.id===model.rootId);iNotes.value=n.notes||"";
 var ch=childrenOf(n.id);
 if(n.id===model.rootId){iStatusCard.innerHTML='<div class="row"><label>中心（ルート）ノード</label></div>'}
 else if(ch.length){var st=leafStats(n.id);iStatusCard.innerHTML='<div class="row"><label>進捗</label><span class="frac">'+st.done+" / "+st.total+"</span></div>"}
 else{iStatusCard.innerHTML='<div class="row"><label>完了</label><span class="switch"><input type="checkbox" id="iDone"'+(n.done?" checked":"")+'><span class="track"></span><span class="knob"></span></span></div><div class="row"><label>相手ボール（待ち）</label><span class="switch"><input type="checkbox" id="iWait"'+(n.wait?" checked":"")+'><span class="track amber"></span><span class="knob"></span></span></div>';document.getElementById("iDone").onchange=function(){n.done=this.checked;if(n.done)n.wait=false;save();render()};document.getElementById("iWait").onchange=function(){n.wait=this.checked;if(n.wait)n.done=false;save();render()}}
 Array.prototype.forEach.call(iColors.children,function(s){s.classList.toggle("on",s.dataset.c===(n.color||""))});
 var root=(n.id===model.rootId);document.getElementById("iSib").style.display=root?"none":"";document.getElementById("iDel").style.display=root?"none":"";
}
iTitle.addEventListener("input",function(){var n=model.nodes[selected];if(!n)return;n.title=iTitle.value||"無題";if(nodeEls[selected])nodeEls[selected].querySelector(".ttl").textContent=n.title;save()});
iDue.addEventListener("change",function(){var n=model.nodes[selected];if(!n)return;n.due=iDue.value;save();render()});
iNotes.addEventListener("input",function(){var n=model.nodes[selected];if(!n)return;n.notes=iNotes.value;save()});
iNotes.addEventListener("blur",function(){render()});
iColors.addEventListener("click",function(e){var s=e.target.closest(".sw");if(!s)return;var n=model.nodes[selected];if(!n)return;n.color=(n.color===s.dataset.c?"":s.dataset.c);save();render()});

function act(e){var b=e.target.closest("[data-act]");if(!b)return;var a=b.dataset.act;
 if(a==="add-child")addChild(selected||model.rootId);
 else if(a==="add-sib")addSibling(selected);
 else if(a==="del")del(selected);
 else if(a==="close"){selected=null;render()}
 else if(a==="layout"){layout(model);save();render();fit()}
 else if(a==="focus"){focusMode=!focusMode;document.getElementById("focusBtn").classList.toggle("on",focusMode);render()}
 else if(a==="fit")fit();
 else if(a==="zin")zoomAt(viewport.clientWidth/2,viewport.clientHeight/2,1.25);
 else if(a==="zout")zoomAt(viewport.clientWidth/2,viewport.clientHeight/2,.8);
 else if(a==="menu"){menu.classList.toggle("open");return}
 else if(a==="export"){var blob=new Blob([JSON.stringify(model,null,2)],{type:"application/json"}),u=URL.createObjectURL(blob),el=document.createElement("a");el.href=u;el.download="roadmap.json";el.click();setTimeout(function(){URL.revokeObjectURL(u)},800)}
 else if(a==="import")document.getElementById("file").click();
 else if(a==="reset"){if(confirm("すべてのタスクのチェックを外しますか？")){for(var key in model.nodes)if(!childrenOf(key).length)model.nodes[key].done=false;save();render()}}
 menu.classList.remove("open");
}
document.querySelector(".bar").addEventListener("click",act);
document.querySelector(".zoom").addEventListener("click",act);
menu.addEventListener("click",act);
inspector.addEventListener("click",act);
document.addEventListener("click",function(e){if(!e.target.closest("#menu")&&!e.target.closest('[data-act="menu"]'))menu.classList.remove("open")});
document.getElementById("file").addEventListener("change",function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{var m=JSON.parse(rd.result);if(m&&m.nodes&&m.nodes[m.rootId]){model=m;selected=null;save();render();fit()}else alert("形式が違います")}catch(err){alert("読み込みに失敗しました")}};rd.readAsText(f);e.target.value=""});

world.addEventListener("dblclick",function(e){var t=e.target.closest(".ttl");if(t)startEdit(t.closest(".node").dataset.id)});
viewport.addEventListener("dblclick",function(e){if(e.target.closest(".node"))return;var r=viewport.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,1.4)});

var mode=null,dragId=null,tapAct=null,tapId=null,moved=false,s0=[0,0],w0=[0,0],p0=[0,0];
viewport.addEventListener("pointerdown",function(e){if(editing)return;var t=e.target,col=t.closest(".collapse"),chk=t.closest(".check"),ne=t.closest(".node");moved=false;s0=[e.clientX,e.clientY];try{viewport.setPointerCapture(e.pointerId)}catch(_){}
 if(col){mode="tap";tapAct="collapse";tapId=col.closest(".node").dataset.id}
 else if(chk){mode="tap";tapAct="check";tapId=chk.closest(".node").dataset.id}
 else if(ne){mode="node";dragId=ne.dataset.id;var n=model.nodes[dragId];w0=[n.x,n.y]}
 else{mode="pan";p0=[tx,ty];viewport.classList.add("grabbing")}});
viewport.addEventListener("pointermove",function(e){if(!mode)return;var dx=e.clientX-s0[0],dy=e.clientY-s0[1];if(Math.hypot(dx,dy)>9)moved=true;
 if(mode==="node"){if(!moved)return;var n=model.nodes[dragId];n.x=w0[0]+dx/k;n.y=w0[1]+dy/k;var el=nodeEls[dragId];if(el){el.style.left=n.x+"px";el.style.top=n.y+"px"}drawEdges()}
 else if(mode==="pan"){tx=p0[0]+dx;ty=p0[1]+dy;applyT()}});
viewport.addEventListener("pointerup",function(e){viewport.classList.remove("grabbing");
 if(mode==="tap"&&!moved){var nd=model.nodes[tapId];if(tapAct==="check"){nd.done=!nd.done}else{nd.collapsed=!nd.collapsed}save();render()}
 else if(mode==="node"){if(!moved){select(dragId)}else{var el=nodeEls[dragId];el.style.pointerEvents="none";var tg=document.elementFromPoint(e.clientX,e.clientY);el.style.pointerEvents="";var te=tg&&tg.closest?tg.closest(".node"):null;if(te){var tid=te.dataset.id;if(tid!==dragId&&!isDesc(tid,dragId))model.nodes[dragId].parent=tid}save();render()}}
 else if(mode==="pan"&&!moved){selected=null;render()}
 mode=null;dragId=null;save()});
viewport.addEventListener("wheel",function(e){e.preventDefault();var r=viewport.getBoundingClientRect();var f=Math.exp(-e.deltaY*0.0011);if(f>1.05)f=1.05;if(f<0.95)f=0.95;zoomAt(e.clientX-r.left,e.clientY-r.top,f)},{passive:false});

document.addEventListener("keydown",function(e){if(editing)return;var tag=(e.target.tagName||"").toLowerCase();if(tag==="input"||tag==="textarea")return;if(!selected)return;
 if(e.key==="Tab"){e.preventDefault();addChild(selected)}
 else if(e.key==="Enter"){e.preventDefault();addSibling(selected)}
 else if(e.key==="Delete"||e.key==="Backspace"){e.preventDefault();del(selected)}
 else if(e.key==="F2"){e.preventDefault();startEdit(selected)}
 else if(e.key==="Escape"){selected=null;render()}});
window.addEventListener("resize",resizeCanvas);
resizeCanvas();render();fit();
})();
</script>
</body>
</html>
